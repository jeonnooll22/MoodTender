<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodTender</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <h1>MoodTender</h1>
      <span class="subtitle">감정 바텐더</span>
    </div>
    <div class="header-right">
      <span id="username-badge" class="username-badge"></span>
      <div class="model-bar">
        <span id="model-status-text">모델 미로드</span>
        <button id="load-model-btn" onclick="loadModel()">모델 로드</button>
      </div>
      <button id="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">

      <!-- 아바타 설정 -->
      <div class="panel">
        <div class="panel-header">아바타 설정</div>
        <p id="avatar-status" class="status-text">기본 바텐더 사용 중</p>

        <!-- 탭 선택 -->
        <div class="avatar-tabs">
          <button class="tab-btn active" onclick="switchTab('photo')">사진으로 만들기</button>
          <button class="tab-btn" onclick="switchTab('video')">영상으로 만들기</button>
        </div>

        <!-- 사진 탭 (LivePortrait → MuseTalk) -->
        <div id="tab-photo" class="avatar-form">
          <input type="file" id="avatar-file" accept=".jpg,.jpeg,.png,.webp" />

          <label class="field-label">움직임 스타일</label>
          <select id="driving-style">
            <option value="기본">기본 (자연스러운)</option>
            <option value="활발">활발한 움직임</option>
            <option value="차분">차분한 움직임</option>
          </select>

          <label class="field-label">움직임 강도 — <span id="motion-val">0.5</span></label>
          <input type="range" id="motion" min="0.2" max="1.0" step="0.1" value="0.5"
            oninput="document.getElementById('motion-val').textContent = this.value" />

          <label class="field-label">움직임 범위</label>
          <select id="region">
            <option value="all">전체</option>
            <option value="exp">표정</option>
            <option value="lip">입</option>
            <option value="pose">고개</option>
          </select>

          <label class="field-label">입 위치 보정 — <span id="bbox-val">0</span></label>
          <input type="range" id="bbox-shift" min="-10" max="10" step="1" value="0"
            oninput="document.getElementById('bbox-val').textContent = this.value" />

          <button id="init-avatar-btn" class="btn-secondary" onclick="initAvatar()" disabled>
            아바타 생성
          </button>
          <video id="lp-preview" controls autoplay hidden></video>
        </div>

        <!-- 영상 탭 (영상 직접 → MuseTalk) -->
        <div id="tab-video" class="avatar-form" style="display:none;">
          <input type="file" id="avatar-video-file" accept=".mp4,.mov,.avi,.mkv" />

          <label class="field-label">입 위치 보정 — <span id="bbox-val-v">0</span></label>
          <input type="range" id="bbox-shift-v" min="-10" max="10" step="1" value="0"
            oninput="document.getElementById('bbox-val-v').textContent = this.value" />

          <button id="init-avatar-video-btn" class="btn-secondary" onclick="initAvatarVideo()" disabled>
            아바타 생성
          </button>
        </div>
      </div>

      <!-- 텍스트 입력 -->
      <div class="panel">
        <div class="panel-header">바텐더에게 말하기</div>
        <textarea id="text-input" placeholder="말할 내용을 입력하세요..." rows="5"></textarea>

        <label class="field-label">목소리</label>
        <select id="voice-select"></select>

        <button id="generate-btn" class="btn-primary" onclick="generate()" disabled>
          생성
        </button>
        <p id="gen-status" class="status-text"></p>
      </div>

    </aside>

    <section class="output">
      <div class="video-wrap">
        <video id="video-output" controls></video>
        <div id="video-placeholder">영상이 여기에 표시됩니다</div>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
